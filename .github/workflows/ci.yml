name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: packages/cicd-gate

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Go test
        working-directory: packages/cicd-gate
        run: go test ./...

  policy-test:
    name: Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -sL https://openpolicyagent.org/downloads/latest/opa_linux_amd64 -o /usr/local/bin/opa
          chmod +x /usr/local/bin/opa
      - name: Run OPA tests
        run: opa test packages/policies/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, policy-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        working-directory: packages/cicd-gate
        run: go build -o cicd-gate ./...
