name: 'Compliance Gate'
description: 'Check IaC against Australian ISM and Essential Eight compliance policies'
author: 'Compliance Platform Team'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  policy-path:
    description: 'Path to policy files directory'
    required: false
    default: './policies'
  
  scan-path:
    description: 'Path to scan for compliance violations'
    required: false
    default: '.'
  
  socratic:
    description: 'Enable verbose output with framework IDs, tier labels, and legal disclaimer'
    required: false
    default: 'false'

outputs:
  violations-count:
    description: 'Total number of violations found'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - scan
    - ${{ inputs.scan-path }}
    - --policy
    - ${{ inputs.policy-path }}
