apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-deploy
spec:
  template:
    spec:
      containers:
        - name: web
          image: nginx@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            privileged: false
