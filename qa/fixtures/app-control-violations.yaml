apiVersion: v1
kind: Namespace
metadata:
  name: bad-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-app
  namespace: bad-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bad
  template:
    metadata:
      labels:
        app: bad
    spec:
      containers:
        - name: app
          image: some-random.example.com/myapp:v1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
