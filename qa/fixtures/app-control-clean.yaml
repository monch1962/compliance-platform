apiVersion: v1
kind: Namespace
metadata:
  name: good-ns
  labels:
    pod-security.kubernetes.io/enforce: "baseline"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-app
  namespace: good-ns
  annotations:
    backup.velero.io/schedule: "daily"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: good
  template:
    metadata:
      labels:
        app: good
    spec:
      serviceAccountName: app-sa
      automountServiceAccountToken: false
      nodeSelector:
        workload: general
      containers:
        - name: app
          image: docker.io/myapp:1.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
