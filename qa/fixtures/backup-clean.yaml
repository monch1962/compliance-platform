apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: production
  annotations:
    backup.velero.io/schedule: "daily"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      serviceAccountName: db-sa
      automountServiceAccountToken: false
      nodeSelector:
        workload: general
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: db
          image: postgres@sha256:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          ports:
            - containerPort: 8080
          livenessProbe:
            exec:
              command:
                - pg_isready
          readinessProbe:
            exec:
              command:
                - pg_isready
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: production
  annotations:
    backup.velero.io/schedule: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
