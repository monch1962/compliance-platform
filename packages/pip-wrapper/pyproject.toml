[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "cicd-gate"
version = "0.3.1"
description = "CI/CD compliance gate for Australian ISM and Essential Eight"
readme = "README.md"
authors = [
    {name = "David M. Monch", email = "monch1962@gmail.com"},
]
license = {text = "Apache-2.0"}
requires-python = ">=3.8"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
]

[project.urls]
Homepage = "https://github.com/monch1962/compliance-platform"
Source = "https://github.com/monch1962/compliance-platform"
